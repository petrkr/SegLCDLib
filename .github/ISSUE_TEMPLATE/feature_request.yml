name: Feature request
description: Suggest a library, docs, tooling, or workflow improvement
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation are you hitting?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What change do you want?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Examples, constraints, compatibility notes

